name: Publish create-harmoni

on:
  push:
    tags:
      - "create-harmoni-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/create-harmoni-v}"
          PKG=$(node -p "require('./packages/create-harmoni/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag version ($TAG) does not match packages/create-harmoni version ($PKG)"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish create-harmoni to npm
        run: pnpm --filter create-harmoni publish --access public --no-git-checks
